name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Types first: `nest build` skips spec files and jest transpiles without
      # checking them, so type errors in tests used to accumulate unseen. This
      # step covers everything tsconfig covers, tests included.
      - name: Check types
        run: npm run typecheck

      - name: Run tests
        run: npm test


  # Does the application actually START?
  #
  # Nothing else here answers that. tsc and nest build know nothing about
  # dependency injection, and the unit tests hand every service a stub instead
  # of the real module graph. On 21 July a module was left out of an imports
  # array: everything above passed, and production went into a restart loop.
  # This job boots the built app against a throwaway database and waits for it
  # to answer — half a minute that would have caught it.
  boot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start the application and wait for it to answer
        env:
          NODE_ENV: test
          PORT: 3000
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          # Validated at boot but not connected to during it.
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ci
          JWT_SECRET: ci-only-secret-that-is-long-enough-x
          JWT_REFRESH_SECRET: ci-only-refresh-secret-long-enough-x
        run: |
          set -euo pipefail
          # 32 random bytes, base64 — the length the config insists on.
          export KEK_BASE64="$(openssl rand -base64 32)"

          # The build nests output under dist/src because tsconfig also covers
          # scripts/, and the Dockerfile that production uses lives on the
          # server rather than in this repository — so the entry point is found
          # rather than assumed.
          MAIN="$(find dist -name main.js -type f | head -1)"
          if [ -z "$MAIN" ]; then
            echo "No main.js under dist — did the build produce anything?"
            find dist -maxdepth 2 -type d
            exit 1
          fi
          echo "Entry point: $MAIN"

          node "$MAIN" > boot.log 2>&1 &
          APP_PID=$!

          for i in $(seq 1 40); do
            # If it died, stop waiting and show why.
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "The application exited before answering."
              cat boot.log
              exit 1
            fi
            if curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Answered after ${i}s."
              kill "$APP_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "No answer within 40s."
          cat boot.log
          kill "$APP_PID" 2>/dev/null || true
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [test, boot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'EOF'
          Host myserver
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              IdentityFile ~/.ssh/deploy_key
              UserKnownHostsFile ~/.ssh/known_hosts
              IdentitiesOnly yes
              StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Create source tarball
        run: |
          tar -czf /tmp/server-src.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=dist \
            --exclude=.env \
            --exclude=*.tar.gz \
            .
          ls -lh /tmp/server-src.tar.gz

      - name: Upload to server
        run: scp /tmp/server-src.tar.gz myserver:/tmp/server-src.tar.gz

      - name: Deploy on server
        run: |
          ssh myserver bash << 'ENDSSH'
          set -euo pipefail

          echo "=== Extracting source ==="
          cd /root/mycongregation/server
          # Remove everything except server-only files (Dockerfile/.dockerignore/.env)
          # and .git, so files deleted from the repo don't linger here as stale leftovers.
          find . -mindepth 1 -maxdepth 1 ! -name Dockerfile ! -name .dockerignore ! -name .env ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/server-src.tar.gz

          echo "=== Rebuilding Docker image ==="
          cd /root/mycongregation
          docker compose build server

          echo "=== Restarting container ==="
          docker compose up -d server

          echo "=== Waiting for container ==="
          sleep 8

          echo "=== Running migrations ==="
          docker compose exec -T server npm run migration:run:prod
          echo "=== Verifying migrations applied ==="
          docker compose exec -T server npm run migration:show:prod

          echo "=== Status ==="
          docker compose ps server
          docker compose logs --tail=15 server

          echo "=== Cleanup ==="
          rm /tmp/server-src.tar.gz
          echo "Deploy complete"
          ENDSSH

      - name: Cleanup local
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts ~/.ssh/config /tmp/server-src.tar.gz
